name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 버전 읽기
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 이미 릴리즈된 버전인지 확인
        id: check
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - name: 빌드 (Universal Binary)
        if: steps.check.outputs.SKIP == 'false'
        run: bash scripts/build_universal.sh

      - name: 앱 번들 생성
        if: steps.check.outputs.SKIP == 'false'
        run: bash scripts/create_bundle.sh

      - name: ZIP 압축
        if: steps.check.outputs.SKIP == 'false'
        run: |
          cp "scripts/가계부 설치하기.command" .
          chmod +x "가계부 설치하기.command"
          zip -r budget-planner.zip 가계부.app "가계부 설치하기.command"

      - name: ZIP 서명
        if: steps.check.outputs.SKIP == 'false'
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_TOOL=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          SIG=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_TOOL" --ed-key-file - -p budget-planner.zip)
          LEN=$(wc -c < budget-planner.zip | tr -d ' ')
          echo "SIGNATURE=$SIG" >> $GITHUB_OUTPUT
          echo "LENGTH=$LEN" >> $GITHUB_OUTPUT

      - name: appcast.xml 업데이트
        if: steps.check.outputs.SKIP == 'false'
        run: |
          bash scripts/update_appcast.sh \
            ${{ steps.version.outputs.VERSION }} \
            "${{ steps.sign.outputs.SIGNATURE }}" \
            "${{ steps.sign.outputs.LENGTH }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast.xml for v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin HEAD:main

      - name: 태그 생성 및 Release 업로드
        if: steps.check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "가계부 v${{ steps.version.outputs.VERSION }}"
          files: budget-planner.zip
